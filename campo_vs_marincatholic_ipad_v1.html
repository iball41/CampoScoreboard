<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Campo vs Marin Catholic v8</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@400;500;600&family=Roboto+Mono:wght@500&display=swap');
:root{
  --campo:#C8102E;--campo-light:#FFF0F2;--campo-mid:#F5C2CA;
  --opp:#5A6270;--opp-light:#F0F1F3;--opp-mid:#C8CAD0;
  --bg:#EDEEF2;--card:#FFFFFF;--border:#D8DAE0;
  --text:#1A1C22;--muted:#7A7F90;
  --sh:0 1px 4px rgba(0,0,0,0.10);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;display:flex;flex-direction:column;}
 
/* HEADER */
.hdr{background:var(--campo);color:#fff;padding:6px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;box-shadow:0 2px 6px rgba(200,16,46,0.35);}
.hdr-title{flex:1;font-family:'Oswald',sans-serif;font-size:.9rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
.hdr-right{display:flex;align-items:center;gap:6px;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#ff4444;flex-shrink:0;transition:background .3s;}
.sync-dot.ok{background:#44ff88;}
.view-toggle{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);border-radius:14px;color:#fff;font-size:.7rem;font-weight:600;padding:3px 10px;cursor:pointer;white-space:nowrap;}
.hdr select{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);border-radius:14px;color:#fff;font-size:.75rem;font-weight:600;font-family:'Inter',sans-serif;padding:3px 10px;outline:none;appearance:none;-webkit-appearance:none;cursor:pointer;}
.hdr select option{color:#000;background:#fff;}
 
/* SCORE STRIP */
.score-strip{background:var(--card);border-bottom:1px solid var(--border);padding:5px 12px;display:grid;grid-template-columns:1fr auto 1fr;gap:0 6px;align-items:center;flex-shrink:0;}
.tc{display:flex;flex-direction:column;gap:0;}
.tc.opp{align-items:flex-end;}
.tc-school{font-family:'Oswald',sans-serif;font-size:.56rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.tc-mascot{font-family:'Oswald',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
.tc.campo .tc-mascot{color:var(--campo);}
.tc.opp .tc-mascot{color:var(--opp);}
.tc-score{font-family:'Oswald',sans-serif;font-size:1.9rem;font-weight:700;line-height:1;}
.tc.campo .tc-score{color:var(--campo);}
.tc.opp .tc-score{color:var(--opp);}
.score-adj{display:flex;gap:3px;margin-top:1px;}
.adj-btn{background:var(--bg);border:1px solid var(--border);border-radius:5px;font-size:.58rem;font-weight:700;padding:1px 7px;cursor:pointer;color:var(--text);user-select:none;transition:transform .1s,opacity .1s;}
.adj-btn.minus{color:var(--muted);}
.adj-btn.pressed,.cb.pressed,.bb.pressed,.sbt.pressed,.mb.pressed{transform:scale(.9);opacity:.7;}
.cc{display:flex;flex-direction:column;align-items:center;gap:2px;}
.clk{font-family:'Roboto Mono',monospace;font-size:1.15rem;font-weight:500;color:var(--text);letter-spacing:1px;}
.clk.run{color:#1a7a40;}
.clk-btns{display:flex;gap:3px;}
.cb{background:var(--bg);border:1px solid var(--border);border-radius:5px;font-size:.58rem;font-weight:600;padding:2px 7px;cursor:pointer;color:var(--text);transition:transform .1s,opacity .1s;}
.cb.go{color:#1a7a40;border-color:#1a7a4055;}
.cb.stop{color:var(--campo);border-color:rgba(200,16,46,.3);}
 
/* TABS */
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0;}
.tab{flex:1;padding:6px 0;text-align:center;font-size:.72rem;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;}
.tab.active{color:var(--campo);border-bottom-color:var(--campo);}
 
/* PANELS */
.panel{display:none;flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.panel.active{display:flex;flex-direction:column;}
 
/* SHARED BTN */
.bb{border:none;border-radius:8px;font-family:'Oswald',sans-serif;font-weight:700;cursor:pointer;padding:9px 4px;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 2px 5px rgba(0,0,0,.13);user-select:none;-webkit-user-select:none;transition:transform .1s,opacity .1s;}
.bb .t{font-size:1.15rem;line-height:1;}
.bb .b{font-size:.56rem;letter-spacing:.06em;opacity:.85;margin-top:1px;}
.mb{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 2px;font-size:.6rem;font-family:'Inter',sans-serif;font-weight:600;color:var(--text);cursor:pointer;text-align:center;user-select:none;transition:transform .1s,opacity .1s;}
.mb.r{color:var(--campo);background:var(--campo-light);border-color:var(--campo-mid);}
.mb.o{color:var(--opp);background:var(--opp-light);border-color:var(--opp-mid);}
 
/* IPHONE SCORING */
.iphone-view #panel-scoring{padding:5px;gap:4px;}
.tsec{background:var(--card);border-radius:10px;box-shadow:var(--sh);overflow:hidden;flex-shrink:0;}
.tsec-hdr{display:flex;align-items:center;justify-content:space-between;padding:4px 10px;border-bottom:1px solid var(--border);}
.tsec-label{display:flex;flex-direction:column;}
.tsec-school{font-family:'Oswald',sans-serif;font-size:.55rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.tsec-mascot{font-family:'Oswald',sans-serif;font-size:.75rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
.tsec.campo .tsec-mascot{color:var(--campo);}
.tsec.opp .tsec-mascot{color:var(--opp);}
.fr{display:flex;align-items:center;gap:4px;font-size:.62rem;color:var(--muted);}
.fc{font-family:'Oswald',sans-serif;font-size:.85rem;color:#b85000;font-weight:700;min-width:12px;text-align:center;}
.fb{background:#FFF3EE;border:1px solid #F0C0A0;border-radius:4px;padding:1px 6px;font-size:.58rem;font-weight:600;color:#b85000;cursor:pointer;}
.bgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;padding:5px;}
.bb.campo-make{background:var(--campo);color:#fff;}
.bb.campo-miss{background:var(--campo-light);color:var(--campo);border:1px solid var(--campo-mid);box-shadow:none;}
.bb.campo-ft{background:#FFF3C0;color:#8B6000;border:1px solid #E0C060;box-shadow:none;}
.bb.opp-make{background:var(--opp);color:#fff;}
.bb.opp-miss{background:var(--opp-light);color:var(--opp);border:1px solid var(--opp-mid);box-shadow:none;}
.bb.opp-ft{background:#FFF3C0;color:#8B6000;border:1px solid #E0C060;box-shadow:none;}
.mrow{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;padding:0 5px 5px;}
.cnrow{display:flex;gap:5px;flex-shrink:0;padding:0 5px;}
.cnrow input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:7px;padding:5px 10px;font-size:.72rem;font-family:'Inter',sans-serif;color:var(--text);outline:none;}
.cnrow button{background:var(--campo);color:#fff;border:none;border-radius:7px;padding:5px 12px;font-size:.7rem;font-weight:600;cursor:pointer;}
 
/* IPAD SCORING */
.ipad-view #panel-scoring{padding:0;}
.section-label{font-size:.62rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:5px 10px 3px;background:var(--bg);border-bottom:0.5px solid var(--border);flex-shrink:0;}
.player-block{background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0;}
.player-header{display:flex;align-items:center;gap:6px;padding:4px 8px;border-bottom:0.5px solid rgba(0,0,0,.05);}
.player-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--campo);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:background .15s;user-select:none;}
.player-check.active{background:var(--campo);}
.player-check.active::after{content:'✓';color:#fff;font-size:.65rem;font-weight:700;}
.player-info{min-width:80px;flex-shrink:0;}
.player-num{font-family:'Oswald',sans-serif;font-size:.6rem;color:var(--muted);line-height:1;}
.player-name{font-family:'Oswald',sans-serif;font-size:.78rem;font-weight:700;color:var(--campo);line-height:1.1;}
.stat-row-buttons{display:flex;align-items:center;gap:4px;padding:3px 8px;}
.row-label{font-size:.52rem;color:var(--muted);font-weight:600;letter-spacing:.06em;text-transform:uppercase;min-width:28px;flex-shrink:0;}
.btn-strip{display:flex;gap:3px;flex:1;}
.sbt{border:none;border-radius:5px;font-family:'Inter',sans-serif;font-weight:600;cursor:pointer;padding:6px 4px;font-size:.58rem;text-align:center;user-select:none;-webkit-user-select:none;transition:transform .1s,opacity .1s;white-space:nowrap;flex:1;}
.sbt.make{background:var(--campo);color:#fff;}
.sbt.miss{background:var(--campo-light);color:var(--campo);border:1px solid var(--campo-mid);}
.sbt.ft{background:#FFF3C0;color:#8B6000;border:1px solid #E0C060;}
.sbt.eff-g{background:#E8F5E9;color:#2E7D32;border:1px solid #A5D6A7;}
.sbt.eff-b{background:#FFEBEE;color:#C62828;border:1px solid #FFCDD2;}
.sbt.opp-make{background:var(--opp);color:#fff;}
.sbt.opp-misc{background:var(--opp-light);color:var(--opp);border:1px solid var(--opp-mid);}
.sbt.opp-ft{background:#FFF3C0;color:#8B6000;border:1px solid #E0C060;}
.bench-row{display:flex;align-items:center;gap:6px;padding:5px 8px;border-bottom:0.5px solid var(--border);opacity:.45;flex-shrink:0;}
.bench-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);cursor:pointer;flex-shrink:0;}
.opp-section{background:var(--opp-light);border-top:1px solid var(--opp-mid);border-bottom:1px solid var(--opp-mid);flex-shrink:0;}
.opp-section-hdr{display:flex;align-items:center;justify-content:space-between;padding:4px 10px;border-bottom:0.5px solid var(--opp-mid);}
.opp-section-name{font-family:'Oswald',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--opp);}
.opp-stat-row{display:flex;align-items:center;gap:4px;padding:5px 8px;}
 
/* CONFIRM POPUP */
.confirm-popup{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;display:flex;align-items:center;justify-content:center;}
.confirm-box{background:#fff;border-radius:12px;padding:16px 20px;min-width:200px;text-align:center;}
.confirm-box p{font-size:.88rem;font-weight:600;color:var(--text);margin-bottom:12px;}
.confirm-btns{display:flex;gap:8px;justify-content:center;}
.confirm-yes{background:var(--campo);color:#fff;border:none;border-radius:7px;padding:7px 20px;font-size:.8rem;font-weight:600;cursor:pointer;}
.confirm-no{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:7px 20px;font-size:.8rem;font-weight:600;cursor:pointer;color:var(--muted);}
 
/* STATS — sticky header fix: header outside scroll */
#panel-stats{padding:8px;gap:8px;}
.stat-section-title{font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:4px 0 4px;flex-shrink:0;}
.stat-table-wrap{background:var(--card);border-radius:10px;box-shadow:var(--sh);width:100%;margin-bottom:8px;flex-shrink:0;}
.stat-table-header{display:grid;padding:4px 8px;border-bottom:1px solid var(--border);gap:2px;background:var(--bg);border-radius:10px 10px 0 0;position:sticky;top:0;z-index:10;}
.stat-table-header.trad{grid-template-columns:88px 52px repeat(9,1fr);}
.stat-table-header.effort{grid-template-columns:88px repeat(8,1fr);}
.stat-table-header.opp-hdr{grid-template-columns:140px repeat(8,1fr);}
.stat-table-body{overflow:hidden;border-radius:0 0 10px 10px;}
.sth{font-size:.56rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);text-align:center;}
.sth.name{text-align:left;color:var(--campo);}
.sth.opp-name{text-align:left;color:var(--opp);}
.stat-data-row{display:grid;padding:4px 8px;border-bottom:0.5px solid var(--border);gap:2px;align-items:center;}
.stat-data-row:last-child{border-bottom:none;}
.stat-data-row.trad{grid-template-columns:88px 52px repeat(9,1fr);}
.stat-data-row.effort{grid-template-columns:88px repeat(8,1fr);}
.stat-data-row.opp-row{grid-template-columns:140px repeat(8,1fr);}
.stat-data-row.totals{background:#F8F0F0;}
.stat-data-row.opp-totals{background:#F0F1F3;}
.spn{font-size:.7rem;font-weight:600;color:var(--text);}
.spn .num{font-size:.58rem;color:var(--muted);}
.spv{font-family:'Oswald',sans-serif;font-size:.8rem;font-weight:700;color:var(--campo);text-align:center;}
.spv.opp{color:var(--opp);}
.spv.zero{color:var(--border);}
.spv.g{color:#2E7D32;}
.spv.b{color:#C62828;}
.spct{font-size:.52rem;color:var(--muted);display:block;text-align:center;}
 
/* ROSTER */
#panel-roster{padding:8px;gap:6px;}
.roster-card{background:var(--card);border-radius:10px;box-shadow:var(--sh);overflow:hidden;flex-shrink:0;}
.roster-item{display:flex;align-items:center;gap:8px;padding:6px 12px;border-bottom:0.5px solid var(--border);}
.roster-item:last-child{border-bottom:none;}
.roster-num-input{font-family:'Oswald',sans-serif;font-size:.82rem;font-weight:700;color:var(--campo);width:36px;background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:2px 4px;text-align:center;outline:none;}
.roster-name-input{flex:1;font-size:.8rem;background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:3px 6px;font-family:'Inter',sans-serif;color:var(--text);outline:none;}
.roster-bench-btn{background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--muted);font-size:.65rem;padding:3px 8px;cursor:pointer;white-space:nowrap;}
.roster-del{background:var(--campo-light);border:1px solid var(--campo-mid);border-radius:5px;color:var(--campo);font-size:.65rem;padding:3px 8px;cursor:pointer;}
.add-player-row{background:var(--card);border-radius:10px;box-shadow:var(--sh);display:flex;gap:6px;padding:10px;flex-shrink:0;}
.add-player-row input{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:6px 8px;font-size:.78rem;font-family:'Inter',sans-serif;color:var(--text);outline:none;}
.add-player-row input.num{width:52px;text-align:center;}
.add-player-row input.name{flex:1;}
.add-player-row button{background:var(--campo);color:#fff;border:none;border-radius:7px;padding:6px 14px;font-size:.75rem;font-weight:600;cursor:pointer;}
 
/* LOG */
#panel-log{padding:8px;gap:6px;}
.log-controls{display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0;}
.lc{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:6px 10px;font-size:.7rem;font-weight:500;cursor:pointer;color:var(--text);box-shadow:var(--sh);}
.lc.d{color:var(--campo);border-color:var(--campo-mid);}
.log-list{display:flex;flex-direction:column;gap:5px;flex-shrink:0;}
.le{background:var(--card);border-radius:8px;padding:7px 10px;box-shadow:0 1px 3px rgba(0,0,0,.07);display:grid;grid-template-columns:auto 1fr auto;gap:5px;align-items:start;animation:sd .15s ease;}
@keyframes sd{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
.le-dot{width:7px;height:7px;border-radius:50%;margin-top:5px;flex-shrink:0;}
.le-txt{font-size:.75rem;font-weight:600;line-height:1.3;}
.le-sub{font-size:.6rem;font-weight:500;opacity:.55;display:block;}
.le-score{font-family:'Oswald',sans-serif;font-size:.65rem;color:var(--muted);display:block;margin-top:1px;}
.le-ts{text-align:right;display:flex;flex-direction:column;gap:1px;}
.ts-line{font-family:'Roboto Mono',monospace;font-size:.55rem;white-space:nowrap;}
.tw{color:#5080b0;}.tg{color:#1a7a40;}.tv{color:#b85000;}
 
/* SETTINGS */
#panel-settings{padding:8px;gap:8px;}
.scard{background:var(--card);border-radius:10px;padding:12px;box-shadow:var(--sh);flex-shrink:0;}
.scard h3{font-size:.65rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.sr{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.sr label{font-size:.75rem;color:var(--text);min-width:80px;}
.sr input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:.78rem;font-family:'Inter',sans-serif;color:var(--text);outline:none;}
.sr button{background:var(--campo);color:#fff;border:none;border-radius:6px;padding:5px 12px;font-size:.72rem;font-weight:600;cursor:pointer;}
.vd{font-size:.68rem;color:var(--muted);}
.dbtn{width:100%;background:#FFF0F2;border:1px solid var(--campo-mid);border-radius:8px;padding:10px;color:var(--campo);font-size:.78rem;font-weight:600;cursor:pointer;margin-top:4px;}
</style>
</head>
<body>
 
<div class="hdr">
  <div class="hdr-title">🐾 Cougars vs Wildcats</div>
  <div class="hdr-right">
    <div class="sync-dot" id="syncDot"></div>
    <button class="view-toggle" id="viewToggleBtn" onclick="toggleView()">📲 iPad view</button>
    <select id="periodSel" onchange="changePeriod()">
      <option value="Half 1">Half 1</option>
      <option value="Half 2">Half 2</option>
      <option value="OT">OT</option>
    </select>
  </div>
</div>
 
<div class="score-strip">
  <div class="tc campo">
    <div class="tc-school">Campolindo</div>
    <div class="tc-mascot">Cougars</div>
    <div class="tc-score" id="campoScore">0</div>
    <div class="score-adj">
      <button class="adj-btn minus" onclick="scoreAdj('campo',-1)">−1</button>
      <button class="adj-btn" onclick="scoreAdj('campo',1)">+1</button>
    </div>
  </div>
  <div class="cc">
    <div class="clk" id="gameClock">20:00</div>
    <div class="clk-btns">
      <button class="cb go" onclick="startClock()">▶</button>
      <button class="cb stop" onclick="stopClock()">⏸</button>
    </div>
  </div>
  <div class="tc opp">
    <div class="tc-school">Marin Catholic</div>
    <div class="tc-mascot">Wildcats</div>
    <div class="tc-score" id="oppScore">0</div>
    <div class="score-adj" style="justify-content:flex-end;">
      <button class="adj-btn minus" onclick="scoreAdj('opp',-1)">−1</button>
      <button class="adj-btn" onclick="scoreAdj('opp',1)">+1</button>
    </div>
  </div>
</div>
 
<div class="tabs" id="tabBar"></div>
 
<div class="panel active" id="panel-scoring"></div>
<div class="panel" id="panel-stats"></div>
<div class="panel" id="panel-roster">
  <div class="roster-card" id="rosterList"></div>
  <div class="add-player-row">
    <input type="text" class="num" id="newNum" placeholder="#" maxlength="3">
    <input type="text" class="name" id="newName" placeholder="Player name">
    <button onclick="addPlayer()">+ Add</button>
  </div>
</div>
<div class="panel" id="panel-log">
  <div class="log-controls">
    <button class="lc" onclick="undoLast()">↩ Undo</button>
    <button class="lc" onclick="copyLog()">📋 Copy</button>
    <button class="lc" onclick="showExportBox(buildCSV())">⬇ Export</button>
    <button class="lc d" onclick="confirmReset()">🗑 Reset</button>
  </div>
  <div class="log-list" id="logList"></div>
</div>
<div class="panel" id="panel-settings">
  <div class="scard">
    <h3>Clock</h3>
    <div class="sr"><label>Set clock</label><input type="text" id="clockSetInput" placeholder="20:00"><button onclick="setClock()">Set</button></div>
  </div>
  <div class="scard">
    <h3>🎬 Video Sync</h3>
    <div class="sr"><label>Video time</label><input type="text" id="videoInput" placeholder="0:00 or 1:23:45"><button onclick="syncVideo()">Sync</button></div>
    <div class="vd">Current: <span id="videoDisplay" style="font-family:'Roboto Mono',monospace;color:#b85000">—</span></div>
  </div>
  <button class="dbtn" onclick="confirmReset()">🗑 Reset Entire Game</button>
</div>

// ── VIEW ──
let isIPad=window.innerWidth>=768;
function applyView(){
  document.body.className=isIPad?'ipad-view':'iphone-view';
  document.getElementById('viewToggleBtn').textContent=isIPad?'📱 Phone view':'📲 iPad view';
  buildTabs();
  renderScoringPanel();
  if(isIPad) renderRoster();
}
function toggleView(){isIPad=!isIPad;applyView();}
 
// ── TABS ──
let activeTab='scoring';
function buildTabs(){
  const bar=document.getElementById('tabBar');bar.innerHTML='';
  const tabs=isIPad?['scoring','stats','roster','log','settings']:['scoring','stats','log','settings'];
  const labels=isIPad?['Scoring','Stats','Roster','Log','Settings']:['Scoring','Stats','Log','Settings'];
  tabs.forEach((t,i)=>{
    const el=document.createElement('div');
    el.className='tab'+(t===activeTab?' active':'');
    el.textContent=labels[i];
    el.onclick=()=>showTab(t);
    bar.appendChild(el);
  });
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  const ap=document.getElementById('panel-'+activeTab);
  if(ap) ap.classList.add('active');
}
function showTab(n){
  activeTab=n;buildTabs();
  if(n==='stats') renderStatsPanel();
  if(n==='roster') renderRoster();
}

// ── FIREBASE LOAD + LISTENERS ──
db.ref(GAME+'/state').once('value').then(snap=>{
  syncDot(true);
  const d=snap.val();
  if(d){
    if(d.scores){scores={...scores,...d.scores};}
    if(d.fouls){fouls={...fouls,...d.fouls};}
    if(d.clockSec!==undefined) clockSec=d.clockSec;
    if(d.period){period=d.period;const opts=['Half 1','Half 2','OT'];const idx=opts.indexOf(period);document.getElementById('periodSel').selectedIndex=idx>=0?idx:0;}
    if(d.teamSt){teamSt={campo:{...emptyTeamSt(),...(d.teamSt.campo||{})},opp:{...emptyTeamSt(),...(d.teamSt.opp||{})}};}
    document.getElementById('campoScore').textContent=scores.campo;
    document.getElementById('oppScore').textContent=scores.opp;
  }
  renderClk();
  initActivePlayers();
 
  // Real-time listeners
  db.ref(GAME+'/state/scores/campo').on('value',snap=>{if(snap.val()===null)return;const v=snap.val();if(v!==scores.campo){scores.campo=v;document.getElementById('campoScore').textContent=scores.campo;}});
  db.ref(GAME+'/state/scores/opp').on('value',snap=>{if(snap.val()===null)return;const v=snap.val();if(v!==scores.opp){scores.opp=v;document.getElementById('oppScore').textContent=scores.opp;}});
  db.ref(GAME+'/state/teamSt').on('value',snap=>{if(!snap.val())return;const d=snap.val();teamSt={campo:{...emptyTeamSt(),...(d.campo||{})},opp:{...emptyTeamSt(),...(d.opp||{})}};});
 
  // ── CLOCK SYNC (Firebase-driven) ──
  db.ref(GAME+'/state/clockSec').on('value',snap=>{
    if(snap.val()===null)return;
    const v=snap.val();
    if(v!==clockSec){clockSec=v;renderClk();}
  });
  db.ref(GAME+'/state/clockRunning').on('value',snap=>{
    const v=snap.val();
    if(v===true && !running){
      // Another device started the clock
      running=true;
      startLocalTick();
    } else if(v===false && running){
      // Another device stopped the clock
      running=false;
      clearInterval(tick);
      renderClk();
    }
  });
});
 
db.ref(GAME+'/playerTrad').once('value').then(snap=>{const d=snap.val();if(d) Object.keys(d).forEach(id=>{pTrad[id]={...emptyTrad(),...d[id]};});});
db.ref(GAME+'/playerEffort').once('value').then(snap=>{const d=snap.val();if(d) Object.keys(d).forEach(id=>{pEffort[id]={...emptyEffort(),...d[id]};});});
db.ref(GAME+'/roster').once('value').then(snap=>{
  const d=snap.val();
  if(d&&Array.isArray(d)&&d.length>0){
    roster=d.map(p=>({minsPlayed:0,clockInAt:null,...p}));

});
db.ref(GAME+'/log').once('value').then(snap=>{

  entries.forEach(e=>{gameLog.unshift(e);renderLogEntry(e);});

// ── CLOCK ──
function fmt(s){const m=Math.floor(Math.abs(s)/60),sec=Math.abs(s)%60;return`${m}:${sec.toString().padStart(2,'0')}`;}
function fmtMins(s){const m=Math.floor(s/60),sec=s%60;return`${m}:${sec.toString().padStart(2,'0')}`;}
function getCurrentMins(p){if(p.clockInAt===null||p.clockInAt===undefined)return p.minsPlayed||0;return(p.minsPlayed||0)+Math.max(0,(p.clockInAt||0)-(clockSec));}
function renderClk(){const e=document.getElementById('gameClock');e.textContent=fmt(clockSec);e.className='clk'+(running?' run':'');}
function updateAllMins(){roster.filter(p=>p.active).forEach(p=>{document.querySelectorAll('[id="mins-'+p.id+'"]').forEach(el=>{el.textContent=fmtMins(getCurrentMins(p));});});}
function initActivePlayers(){roster.filter(p=>p.active).forEach(p=>{if(p.clockInAt===null||p.clockInAt===undefined)p.clockInAt=clockSec;});}
 
function startLocalTick(){
  clearInterval(tick);
  tick=setInterval(()=>{
    if(clockSec>0){
      clockSec--;
      renderClk();
      updateAllMins();
      // Only the device that initiated saves clockSec to avoid double-writes
    } else {
      stopClock();
    }
  },1000);
}
 
function startClock(){
  if(running)return;
  initActivePlayers();
  running=true;
  // Write to Firebase so all devices sync
  db.ref(GAME+'/state/clockRunning').set(true);
  startLocalTick();
  // Save clockSec every 5s to keep Firebase in sync without flooding
  clearInterval(window._clockSaveInterval);
  window._clockSaveInterval=setInterval(()=>{
    if(running) db.ref(GAME+'/state/clockSec').set(clockSec);
  },5000);
}
 
function stopClock(){
  running=false;
  clearInterval(tick);
  clearInterval(window._clockSaveInterval);
  // Write stop to Firebase
  db.ref(GAME+'/state/clockRunning').set(false);
  db.ref(GAME+'/state/clockSec').set(clockSec);
  renderClk();
}
 
function setClock(){
  const p=document.getElementById('clockSetInput').value.trim().split(':');
  if(p.length===2){clockSec=+p[0]*60+ +p[1];stopClock();db.ref(GAME+'/state/clockSec').set(clockSec);}
}
 
function changePeriod(){
  const opts=['Half 1','Half 2','OT'];
  period=opts[document.getElementById('periodSel').selectedIndex];
  clockSec=period==='OT'?300:1200;
  stopClock();
  db.ref(GAME+'/state/period').set(period);
  db.ref(GAME+'/state/clockSec').set(clockSec);
  addEntry('neutral',period+' Started','—');
}
 
// ── VIDEO ──
function wallNow(){return new Date().toLocaleTimeString();}
function gameNow(){return fmt(clockSec);}
function vidNow(){
  if(vidOffset===null)return'—';
  const t=vidOffset+Math.floor((Date.now()-vidAt)/1000);
  const h=Math.floor(t/3600),m=Math.floor((t%3600)/60),s=t%60;
  return h?`${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`:`${m}:${s.toString().padStart(2,'0')}`;
}
function syncVideo(){
  const p=document.getElementById('videoInput').value.trim().split(':').map(Number);
  if(p.length===2)vidOffset=p[0]*60+p[1];
  else if(p.length===3)vidOffset=p[0]*3600+p[1]*60+p[2];
  else return;vidAt=Date.now();
}
setInterval(()=>document.getElementById('videoDisplay').textContent=vidNow(),500);
 
// ── SCORE ADJ ──
function scoreAdj(team,delta){
  scores[team]=Math.max(0,scores[team]+delta);
  document.getElementById(team+'Score').textContent=scores[team];
  if(team==='campo')saveScoreCampo();else saveScoreOpp();
  addEntry(team,delta>0?'Score +1 (correction)':'Score −1 (correction)','—');
}
 
// ── FOULS ──
function addFoul(team,delta){
  fouls[team]=Math.max(0,fouls[team]+delta);
  document.querySelectorAll('[id="'+team+'FoulsLive"]').forEach(el=>el.textContent=fouls[team]);
  db.ref(GAME+'/state/fouls').set(fouls).catch(()=>{});
}

function makeBenchRow(p){
  const row=document.createElement('div');row.className='bench-row';
  const check=document.createElement('div');check.className='bench-check';check.onclick=()=>toggleActive(p.id);addTouch(check);
  const info=document.createElement('div');info.style.cssText='flex:1;font-size:.78rem;color:var(--muted);';
  info.textContent=`#${p.num} ${p.name}`;
  row.appendChild(check);row.appendChild(info);return row;
}
 
function toggleActive(id){
  const p=roster.find(r=>r.id===id);if(!p)return;
  if(p.active){
    if(p.clockInAt!==null&&p.clockInAt!==undefined){p.minsPlayed=(p.minsPlayed||0)+Math.max(0,p.clockInAt-clockSec);p.clockInAt=null;}
    p.active=false;
  } else {p.clockInAt=clockSec;p.active=true;}
  saveRoster();renderScoringPanel();
}
 
// ── LONG PRESS ──
function addLongPress(el,fn){
  let timer;
  el.addEventListener('touchstart',()=>{timer=setTimeout(fn,600);},{passive:true});
  el.addEventListener('touchend',()=>clearTimeout(timer),{passive:true});
  el.addEventListener('touchmove',()=>clearTimeout(timer),{passive:true});
}

const effortLabels={gbp:'GBP',bbp:'BBP',gbo:'GBO',bbo:'BBO',gwu:'GWU',bwu:'BWU',ghlp:'GHLP',bhlp:'BHLP'};
const tradKeyLabels={'2-pt Make':'2-pt Make','2-pt Miss':'2-pt Miss','3-pt Make':'3-pt Make','3-pt Miss':'3-pt Miss','Free Throw':'Free Throw','Rebound':'REB','Steal':'STL','Block':'BLK','Turnover':'TO'};
function showSubtractConfirm(p,key,type){
  const label=type==='effort'?(effortLabels[key]||key):(tradKeyLabels[key]||key);
  const popup=document.createElement('div');popup.className='confirm-popup';
  popup.innerHTML=`<div class="confirm-box"><p>−1 ${label} for ${p.name}?</p><div class="confirm-btns"><button class="confirm-yes" id="cfYes">Yes</button><button class="confirm-no" id="cfNo">Cancel</button></div></div>`;
  document.body.appendChild(popup);
  document.getElementById('cfYes').onclick=()=>{if(type==='trad')subtractTrad(p,key);else subtractEffort(p,key);popup.remove();};
  document.getElementById('cfNo').onclick=()=>popup.remove();
}
function subtractTrad(p,key){
  const s=pTrad[p.id];let pts=0;
  if(key==='2-pt Make'&&s.fg2m>0){s.fg2m--;s.fg2a--;pts=-2;}
  else if(key==='2-pt Miss'&&s.fg2a>s.fg2m){s.fg2a--;}
  else if(key==='3-pt Make'&&s.fg3m>0){s.fg3m--;s.fg3a--;pts=-3;}
  else if(key==='3-pt Miss'&&s.fg3a>s.fg3m){s.fg3a--;}
  else if(key==='Free Throw'&&s.ftm>0){s.ftm--;s.fta--;pts=-1;}
  else if(key==='Rebound'&&s.reb>0){s.reb--;}
  else if(key==='Steal'&&s.stl>0){s.stl--;}
  else if(key==='Block'&&s.blk>0){s.blk--;}
  else if(key==='Turnover'&&s.to>0){s.to--;}
  if(pts<0){scores.campo=Math.max(0,scores.campo+pts);document.getElementById('campoScore').textContent=scores.campo;saveScoreCampo();}
  saveTrad();addEntry('campo','−1 '+key+' (correction)',`#${p.num} ${p.name}`);
}
function subtractEffort(p,key){
  if(pEffort[p.id][key]>0){pEffort[p.id][key]--;saveEffort();addEntry('campo','−1 '+(effortLabels[key]||key)+' (correction)',`#${p.num} ${p.name}`);}
}
 
// ── TEAM STAT LOGGING ──
function logTeam(team,event,pts){
  const s=teamSt[team];
  if(pts>0){scores[team]=Math.max(0,scores[team]+pts);document.getElementById(team+'Score').textContent=scores[team];if(team==='campo')saveScoreCampo();else saveScoreOpp();}
  if(event==='2-pt Make'){s.fg2m++;s.fg2a++;}else if(event==='2-pt Miss'){s.fg2a++;}
  else if(event==='3-pt Make'){s.fg3m++;s.fg3a++;}else if(event==='3-pt Miss'){s.fg3a++;}
  else if(event==='Free Throw'){s.ftm++;s.fta++;}else if(event==='Rebound'){s.reb++;}
  else if(event==='Steal'){s.stl++;}else if(event==='Block'){s.blk++;}
  else if(event==='Turnover'){s.to++;}else if(event==='Foul'){s.foul++;}
  saveTeamSt();addEntry(team,event,team==='opp'?'Marin Catholic':'');
}
 
// ── PLAYER STAT LOGGING ──
const effortEventLabels={gbp:'Good Ball Pressure',bbp:'Bad Ball Pressure',gbo:'Good Box Out',bbo:'Bad Box Out',gwu:'Good Wall Up',bwu:'Bad Wall Up',ghlp:'Good Help',bhlp:'Bad Help'};
function logTrad(p,event,pts){
  const s=pTrad[p.id];
  if(pts>0){scores.campo+=pts;document.getElementById('campoScore').textContent=scores.campo;saveScoreCampo();}
  if(event==='2-pt Make'){s.fg2m++;s.fg2a++;}else if(event==='2-pt Miss'){s.fg2a++;}
  else if(event==='3-pt Make'){s.fg3m++;s.fg3a++;}else if(event==='3-pt Miss'){s.fg3a++;}
  else if(event==='Free Throw'){s.ftm++;s.fta++;}else if(event==='Rebound'){s.reb++;}
  else if(event==='Steal'){s.stl++;}else if(event==='Block'){s.blk++;}
  else if(event==='Turnover'){s.to++;}
  saveTrad();addEntry('campo',event,`#${p.num} ${p.name}`);
}
function logEffort(p,key){pEffort[p.id][key]++;saveEffort();addEntry('campo',effortEventLabels[key]||key,`#${p.num} ${p.name}`);}
function logCustom(){const v=document.getElementById('customNote').value.trim();if(!v)return;addEntry('neutral',v,'—');document.getElementById('customNote').value='';}
function addEntry(team,event,player){
  const e={team,event,player:player||'',wall:wallNow(),game:gameNow(),vid:vidNow(),period,score:`${scores.campo}–${scores.opp}`,ts:Date.now()};
  gameLog.unshift(e);renderLogEntry(e);saveLogEntry(e);
}
 
// ── STATS PANEL ──
function pct(m,a){return a===0?'—':`${Math.round(m/a*100)}%`;}
function calcPts(s){return(s.fg2m||0)*2+(s.fg3m||0)*3+(s.ftm||0);}
 
function renderStatsPanel(){
  const panel=document.getElementById('panel-stats');
  panel.innerHTML='';
 
  if(isIPad){
    // Campo player trad stats
    const t1=document.createElement('div');t1.className='stat-section-title';t1.textContent='Campo — Traditional Stats';panel.appendChild(t1);
    panel.appendChild(buildTradTable());
    // Campo effort stats
    const t2=document.createElement('div');t2.className='stat-section-title';t2.textContent='Campo — Effort Stats';panel.appendChild(t2);
    panel.appendChild(buildEffortTable());
  } else {
    // iPhone — team level campo stats
    const t1=document.createElement('div');t1.className='stat-section-title';t1.textContent='Campo — Team Stats';panel.appendChild(t1);
    panel.appendChild(buildSingleTeamTable('campo','Cougars'));
  }
 
  // Opponent stats — both views
  const t3=document.createElement('div');t3.className='stat-section-title';t3.textContent='Marin Catholic — Opponent Stats';panel.appendChild(t3);
  panel.appendChild(buildSingleTeamTable('opp','Wildcats'));
}
 
function buildSingleTeamTable(team,mascot){
  const s=teamSt[team];
  const color=team==='campo'?'var(--campo)':'var(--opp)';
  const wrap=document.createElement('div');wrap.className='stat-table-wrap';
  const hdr=document.createElement('div');hdr.className='stat-table-header opp-hdr';
  hdr.innerHTML=`<div class="sth" style="text-align:left;color:${color}">Team</div><div class="sth">PTS</div><div class="sth">2FG</div><div class="sth">3FG</div><div class="sth">FT</div><div class="sth">REB</div><div class="sth">STL</div><div class="sth">BLK</div><div class="sth">TO</div>`;
  const body=document.createElement('div');body.className='stat-table-body';
  const pp=calcPts(s);
  const v=(n)=>`<div class="spv${team==='opp'?' opp':''}${n===0?' zero':''}">${n}</div>`;
  const row=document.createElement('div');row.className='stat-data-row opp-row'+(team==='opp'?' opp-totals':'');
  row.innerHTML=`<div class="spn">${mascot}</div>${v(pp)}<div class="spv${team==='opp'?' opp':''}${s.fg2a===0?' zero':''}">${s.fg2m}/${s.fg2a}<span class="spct">${pct(s.fg2m,s.fg2a)}</span></div><div class="spv${team==='opp'?' opp':''}${s.fg3a===0?' zero':''}">${s.fg3m}/${s.fg3a}<span class="spct">${pct(s.fg3m,s.fg3a)}</span></div><div class="spv${team==='opp'?' opp':''}${s.fta===0?' zero':''}">${s.ftm}/${s.fta}<span class="spct">${pct(s.ftm,s.fta)}</span></div>${v(s.reb)}${v(s.stl)}${v(s.blk)}${v(s.to)}`;
  body.appendChild(row);wrap.appendChild(hdr);wrap.appendChild(body);return wrap;
}
 
function buildTradTable(){
  const wrap=document.createElement('div');wrap.className='stat-table-wrap';
  const hdr=document.createElement('div');hdr.className='stat-table-header trad';
  hdr.innerHTML='<div class="sth name">Player</div><div class="sth">MIN</div><div class="sth">PTS</div><div class="sth">2FG</div><div class="sth">3FG</div><div class="sth">FT</div><div class="sth">REB</div><div class="sth">STL</div><div class="sth">BLK</div><div class="sth">TO</div><div class="sth">Foul</div>';
  const body=document.createElement('div');body.className='stat-table-body';
  const tot={pts:0,fg2m:0,fg2a:0,fg3m:0,fg3a:0,ftm:0,fta:0,reb:0,stl:0,blk:0,to:0,foul:0};
  [...roster.filter(p=>p.active),...roster.filter(p=>!p.active)].forEach(p=>{
    const s={...emptyTrad(),...(pTrad[p.id]||{})};
    const pp=calcPts(s);
    tot.pts+=pp;['fg2m','fg2a','fg3m','fg3a','ftm','fta','reb','stl','blk','to','foul'].forEach(k=>tot[k]+=(s[k]||0));
    const row=document.createElement('div');row.className='stat-data-row trad';
    const v=(n)=>`<div class="spv${n===0?' zero':''}">${n}</div>`;
    row.innerHTML=`<div class="spn"><span class="num">#${p.num}</span> ${p.name}</div><div class="spv" style="font-size:.68rem;">${fmtMins(getCurrentMins(p))}</div>${v(pp)}<div class="spv${s.fg2a===0?' zero':''}">${s.fg2m}/${s.fg2a}<span class="spct">${pct(s.fg2m,s.fg2a)}</span></div><div class="spv${s.fg3a===0?' zero':''}">${s.fg3m}/${s.fg3a}<span class="spct">${pct(s.fg3m,s.fg3a)}</span></div><div class="spv${s.fta===0?' zero':''}">${s.ftm}/${s.fta}<span class="spct">${pct(s.ftm,s.fta)}</span></div>${v(s.reb)}${v(s.stl)}${v(s.blk)}${v(s.to)}${v(s.foul)}`;
    body.appendChild(row);
  });
  const totRow=document.createElement('div');totRow.className='stat-data-row trad totals';
  const v=(n)=>`<div class="spv">${n}</div>`;
  totRow.innerHTML=`<div class="spn">TOTALS</div><div class="spv">—</div>${v(tot.pts)}<div class="spv">${tot.fg2m}/${tot.fg2a}<span class="spct">${pct(tot.fg2m,tot.fg2a)}</span></div><div class="spv">${tot.fg3m}/${tot.fg3a}<span class="spct">${pct(tot.fg3m,tot.fg3a)}</span></div><div class="spv">${tot.ftm}/${tot.fta}<span class="spct">${pct(tot.ftm,tot.fta)}</span></div>${v(tot.reb)}${v(tot.stl)}${v(tot.blk)}${v(tot.to)}${v(tot.foul)}`;
  body.appendChild(totRow);wrap.appendChild(hdr);wrap.appendChild(body);return wrap;
}
 
function buildEffortTable(){
  const wrap=document.createElement('div');wrap.className='stat-table-wrap';
  const hdr=document.createElement('div');hdr.className='stat-table-header effort';
  hdr.innerHTML='<div class="sth name">Player</div><div class="sth" style="color:#2E7D32">GBP</div><div class="sth" style="color:#C62828">BBP</div><div class="sth" style="color:#2E7D32">GBO</div><div class="sth" style="color:#C62828">BBO</div><div class="sth" style="color:#2E7D32">GWU</div><div class="sth" style="color:#C62828">BWU</div><div class="sth" style="color:#2E7D32">GHLP</div><div class="sth" style="color:#C62828">BHLP</div>';
  const body=document.createElement('div');body.className='stat-table-body';
  const keys=['gbp','bbp','gbo','bbo','gwu','bwu','ghlp','bhlp'];
  const tot={gbp:0,bbp:0,gbo:0,bbo:0,gwu:0,bwu:0,ghlp:0,bhlp:0};
  [...roster.filter(p=>p.active),...roster.filter(p=>!p.active)].forEach(p=>{
    const s={...emptyEffort(),...(pEffort[p.id]||{})};
    keys.forEach(k=>tot[k]+=(s[k]||0));
    const row=document.createElement('div');row.className='stat-data-row effort';
    const v=(n,good)=>`<div class="spv ${n===0?'zero':good?'g':'b'}">${n}</div>`;
    row.innerHTML=`<div class="spn"><span class="num">#${p.num}</span> ${p.name}</div>${v(s.gbp,true)}${v(s.bbp,false)}${v(s.gbo,true)}${v(s.bbo,false)}${v(s.gwu,true)}${v(s.bwu,false)}${v(s.ghlp,true)}${v(s.bhlp,false)}`;
    body.appendChild(row);
  });
  const totRow=document.createElement('div');totRow.className='stat-data-row effort totals';
  const v=(n,good)=>`<div class="spv ${good?'g':'b'}">${n}</div>`;
  totRow.innerHTML=`<div class="spn">TOTALS</div>${v(tot.gbp,true)}${v(tot.bbp,false)}${v(tot.gbo,true)}${v(tot.bbo,false)}${v(tot.gwu,true)}${v(tot.bwu,false)}${v(tot.ghlp,true)}${v(tot.bhlp,false)}`;
  body.appendChild(totRow);wrap.appendChild(hdr);wrap.appendChild(body);return wrap;
}
 
// ── ROSTER ──
function renderRoster(){
  const list=document.getElementById('rosterList');if(!list)return;list.innerHTML='';
  roster.forEach(p=>{
    const row=document.createElement('div');row.className='roster-item';
    row.innerHTML=`<input class="roster-num-input" value="${p.num}" onchange="updatePlayer('${p.id}','num',this.value)"><input class="roster-name-input" value="${p.name}" onchange="updatePlayer('${p.id}','name',this.value)"><button class="roster-bench-btn" onclick="toggleActive('${p.id}')">${p.active?'→ Bench':'→ Floor'}</button><button class="roster-del" onclick="deletePlayer('${p.id}')">✕</button>`;
    list.appendChild(row);
  });
}
function updatePlayer(id,field,val){const p=roster.find(r=>r.id===id);if(p){p[field]=val;saveRoster();renderScoringPanel();}}
function deletePlayer(id){if(!confirm('Remove this player?'))return;roster=roster.filter(r=>r.id!==id);saveRoster();renderScoringPanel();renderRoster();}
function addPlayer(){
  const num=document.getElementById('newNum').value.trim()||'-';
  const name=document.getElementById('newName').value.trim();
  if(!name){alert('Please enter a name.');return;}
  const id='p'+Date.now();
  roster.push({id,num,name,active:false,minsPlayed:0,clockInAt:null});
  pTrad[id]=emptyTrad();pEffort[id]=emptyEffort();
  document.getElementById('newNum').value='';document.getElementById('newName').value='';
  saveRoster();saveTrad();saveEffort();renderScoringPanel();renderRoster();
}
 
// ── LOG ──
function renderLogEntry(e){
  const list=document.getElementById('logList');
  const tc=e.team==='campo'?'var(--campo)':e.team==='opp'?'var(--opp)':'var(--muted)';
  const d=document.createElement('div');d.className='le';
  d.innerHTML=`<div class="le-dot" style="background:${tc}"></div>
    <div class="le-txt">${e.player&&e.player!=='—'?`<span class="le-sub">${e.player}</span>`:''} ${e.event}<span class="le-score">${e.score} · ${e.period}</span></div>
    <div class="le-ts"><span class="ts-line tw">⏰ ${e.wall}</span><span class="ts-line tg">🏀 ${e.game}</span><span class="ts-line tv">🎬 ${e.vid}</span></div>`;
  list.insertBefore(d,list.firstChild);
}
function undoLast(){if(!gameLog.length)return;gameLog.shift();const l=document.getElementById('logList');if(l.firstChild)l.removeChild(l.firstChild);alert('Removed.');}
function buildCSV(){
  const rows=['Period,ActualT,GameT,VideoT,Team,Player,Event,Score'];
  [...gameLog].reverse().forEach(e=>rows.push(`"${e.period}","${e.wall}","${e.game}","${e.vid}","${e.team}","${e.player||''}","${e.event}","${e.score}"`));
  return rows.join('\n');
}
function copyLog(){navigator.clipboard.writeText(buildCSV()).then(()=>alert('✅ Copied!')).catch(()=>showExportBox(buildCSV()));}
function showExportBox(csv){
  let box=document.getElementById('exportBox');
  if(!box){box=document.createElement('div');box.id='exportBox';box.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;display:flex;flex-direction:column;padding:16px;gap:8px;';
    box.innerHTML=`<div style="background:#fff;border-radius:10px;padding:10px;flex:1;display:flex;flex-direction:column;gap:8px;overflow:hidden;"><div style="display:flex;justify-content:space-between;"><span style="font-size:.8rem;font-weight:600;">Select All → Copy</span><button onclick="document.getElementById('exportBox').remove()" style="background:var(--campo);color:#fff;border:none;border-radius:6px;padding:4px 10px;font-size:.75rem;font-weight:600;cursor:pointer;">Close</button></div><textarea readonly style="flex:1;background:#EDEEF2;border:1px solid #D8DAE0;border-radius:8px;padding:8px;font-family:monospace;font-size:.65rem;resize:none;outline:none;">${csv}</textarea></div>`;
    document.body.appendChild(box);
  } else {box.querySelector('textarea').value=csv;box.style.display='flex';}
}
 
// ── RESET ──
function confirmReset(){if(!confirm('Reset entire game? Cannot be undone.'))return;
  scores={campo:0,opp:0};fouls={campo:0,opp:0};clockSec=1200;stopClock();
  vidOffset=null;vidAt=null;gameLog=[];
  teamSt={campo:emptyTeamSt(),opp:emptyTeamSt()};
  roster.forEach(p=>{p.minsPlayed=0;p.clockInAt=null;pTrad[p.id]=emptyTrad();pEffort[p.id]=emptyEffort();});
  document.getElementById('campoScore').textContent='0';document.getElementById('oppScore').textContent='0';
  document.getElementById('logList').innerHTML='';document.getElementById('videoDisplay').textContent='—';
  document.getElementById('periodSel').selectedIndex=0;period='Half 1';
  saveScoreCampo();saveScoreOpp();saveTeamSt();saveTrad();saveEffort();saveRoster();
  db.ref(GAME+'/state/fouls').set(fouls);db.ref(GAME+'/state/period').set(period);
  db.ref(GAME+'/state/clockSec').set(clockSec);db.ref(GAME+'/state/clockRunning').set(false);
  db.ref(GAME+'/log').set(null);renderScoringPanel();renderClk();
}
 
// ── TOUCH FEEDBACK ──
function addTouch(el){el.addEventListener('touchstart',()=>{el.classList.add('pressed');setTimeout(()=>el.classList.remove('pressed'),180);},{passive:true});}
document.addEventListener('DOMContentLoaded',()=>{document.querySelectorAll('.cb,.lc,.adj-btn,.fb').forEach(b=>addTouch(b));});
 
// ── INIT ──
renderClk();
applyView();
initActivePlayers();
</script>
